<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Portfolio</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Outfit',sans-serif; background:#000; }
#solar-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
#ui-layer { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
#ui-layer * { pointer-events: auto; }

/* Navigation */
.nav-bar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:16px 32px; background:rgba(0,0,0,0.4); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.06); }
.nav-brand { font-family:'Space Mono',monospace; font-size:18px; color:#fff; letter-spacing:2px; font-weight:700; }
.nav-links { display:flex; gap:8px; }
.nav-link { padding:6px 16px; font-size:13px; color:rgba(255,255,255,0.6); cursor:pointer; border-radius:20px; transition:all 0.3s; border:1px solid transparent; font-weight:500; letter-spacing:0.5px; background:none; }
.nav-link:hover, .nav-link.active { color:#fff; background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); }

/* Planet Labels in 3D */
.planet-label { position:absolute; color:#fff; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-family:'Space Mono',monospace; opacity:0.7; pointer-events:none; white-space:nowrap; transform:translate(-50%,-100%); text-shadow:0 0 20px rgba(255,255,255,0.5); }

/* Detail Panel */
.detail-panel { position:fixed; right:0; top:0; bottom:0; width:480px; max-width:90%; background:rgba(8,8,16,0.92); backdrop-filter:blur(30px); border-left:1px solid rgba(255,255,255,0.08); transform:translateX(100%); transition:transform 0.5s cubic-bezier(0.16,1,0.3,1); overflow-y:auto; z-index:200; padding:80px 40px 40px; }
.detail-panel.open { transform:translateX(0); }
.detail-panel::-webkit-scrollbar { width:4px; }
.detail-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:4px; }
.panel-close { position:absolute; top:24px; right:24px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
.panel-close:hover { background:rgba(255,255,255,0.12); }
.panel-section-tag { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.panel-title { font-size:32px; font-weight:700; color:#fff; margin-bottom:24px; line-height:1.2; }
.panel-text { font-size:15px; color:rgba(255,255,255,0.65); line-height:1.8; margin-bottom:20px; }
.panel-divider { height:1px; background:rgba(255,255,255,0.08); margin:28px 0; }

/* Skill tags */
.skill-tag { display:inline-block; padding:6px 14px; margin:4px; font-size:12px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.04); font-family:'Space Mono',monospace; letter-spacing:0.5px; }

/* Project cards */
.project-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:24px; margin-bottom:16px; transition:all 0.3s; }
.project-card:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.15); }
.project-card h4 { font-size:17px; font-weight:600; color:#fff; margin-bottom:8px; }
.project-card p { font-size:13px; color:rgba(255,255,255,0.55); line-height:1.7; }

/* Contact link */
.contact-link { display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); margin-bottom:12px; color:rgba(255,255,255,0.7); text-decoration:none; transition:all 0.3s; font-size:14px; }
.contact-link:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); color:#fff; }
.contact-link .link-icon { width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* Certificate / Coding Platform placeholder */
.placeholder-item { padding:20px; border-radius:12px; border:1px dashed rgba(255,255,255,0.15); margin-bottom:12px; text-align:center; color:rgba(255,255,255,0.35); font-size:13px; font-family:'Space Mono',monospace; }

/* Hero overlay */
.hero-overlay { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); text-align:center; z-index:50; pointer-events:none; }
.hero-name { font-size:clamp(28px,5vw,56px); font-weight:700; color:#fff; letter-spacing:2px; margin-bottom:8px; }
.hero-title { font-size:clamp(13px,2vw,18px); color:rgba(255,255,255,0.5); font-family:'Space Mono',monospace; letter-spacing:4px; text-transform:uppercase; }
.hero-hint { margin-top:20px; font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:1px; animation:pulse-hint 2s ease-in-out infinite; }
@keyframes pulse-hint { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

/* Mobile nav */
.mobile-menu-btn { display:none; background:none; border:none; color:#fff; cursor:pointer; padding:8px; }
@media(max-width:768px){
  .nav-links { position:fixed; top:60px; left:0; right:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(20px); flex-direction:column; padding:16px; gap:4px; display:none; border-bottom:1px solid rgba(255,255,255,0.08); }
  .nav-links.show { display:flex; }
  .mobile-menu-btn { display:block; }
  .detail-panel { width:100%; max-width:100%; padding:80px 24px 24px; }
  .hero-overlay { bottom:40px; }
  .nav-bar { padding:12px 16px; }
}
</style>
  <style>body { box-sizing: border-box; }</style>

 </head>
 <body>
  <canvas id="solar-canvas"></canvas><!-- Navigation -->
  <nav class="nav-bar">
   <div class="nav-brand" id="nav-brand">
    PORTFOLIO
   </div><button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu"><i data-lucide="menu" style="width:22px;height:22px;"></i></button>
   <div class="nav-links" id="nav-links"><button class="nav-link active" data-section="home" aria-label="Home">Home</button> <button class="nav-link" data-section="about" aria-label="About">About</button> <button class="nav-link" data-section="skills" aria-label="Skills">Skills</button> <button class="nav-link" data-section="projects" aria-label="Projects">Projects</button> <button class="nav-link" data-section="experience" aria-label="Experience">Experience</button> <button class="nav-link" data-section="education" aria-label="Education">Education</button> <button class="nav-link" data-section="certificates" aria-label="Certificates">Certificates</button> <button class="nav-link" data-section="coding" aria-label="Coding">Coding</button> <button class="nav-link" data-section="contact" aria-label="Contact">Contact</button>
   </div>
  </nav><!-- Hero Overlay -->
  <div class="hero-overlay" id="hero-overlay">
   <div class="hero-name" id="hero-name">
    Subham Kr Singh
   </div>
   <div class="hero-title" id="hero-title">
    Software Developer
   </div>
   <div class="hero-hint">
    Click a planet or use navigation to explore →
   </div>
  </div><!-- Planet Labels Container -->
  <div id="ui-layer"></div><!-- Detail Panel -->
  <div class="detail-panel" id="detail-panel"><button class="panel-close" id="panel-close" aria-label="Close panel"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
   <div id="panel-content"></div>
  </div>
  <script>
// --- CONFIG & SDK ---
const defaultConfig = {
  your_name: 'Subham Kr Singh',
  your_title: 'Software Developer',
  about_text: 'I’m a software developer who enjoys turning ideas into real, working solutions. I focus on writing clean, efficient code and solving problems with a logical approach. Constantly learning and improving, I aim to build applications that are not just functional, but meaningful',
  experience_text: '5+ years of professional experience in full-stack web development, working with startups and enterprise companies to deliver scalable applications.',
  project1_title: 'E-Commerce Platform',
  project1_desc: 'A full-featured e-commerce solution built with React, Node.js, and PostgreSQL. Features include real-time inventory, payment integration, and admin dashboard.',
  project2_title: 'AI Analytics Dashboard',
  project2_desc: 'Real-time data visualization platform with machine learning insights. Built with Python, D3.js, and WebSocket for live data streaming.',
  project3_title: 'Mobile Fitness App',
  project3_desc: 'Cross-platform fitness tracking application with workout plans, progress tracking, and social features. Built with React Native and Firebase.',
  education_text: 'B.Tech in Computer Science & Engineering',
  email_address: 'subh.raajput@gmail.com',
  github_url: 'https://github.com/Subh10infinity',
  linkedin_url: 'https://linkedin.com/in/singhkrsubham049',
  background_color: '#050510',
  surface_color: '#0d0d1a',
  text_color: '#ffffff',
  primary_action: '#6366f1',
  secondary_action: '#a78bfa',
  font_family: 'Outfit',
  font_size: 16
};

let currentSection = 'home';

function getConfig() { return window.elementSdk?.config || defaultConfig; }

// --- THREE.JS SOLAR SYSTEM ---
const canvas = document.getElementById('solar-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 50);
camera.lookAt(0,0,0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xffeedd, 2, 200);
scene.add(sunLight);

// Stars background
const starsGeo = new THREE.BufferGeometry();
const starsVerts = [];
for(let i=0;i<3000;i++){
  starsVerts.push((Math.random()-0.5)*600, (Math.random()-0.5)*600, (Math.random()-0.5)*600);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVerts,3));
const starsMat = new THREE.PointsMaterial({ color:0xffffff, size:0.5, transparent:true, opacity:0.8 });
scene.add(new THREE.Points(starsGeo, starsMat));

// Planet definitions: section, color, size, orbitRadius, speed, emissive
const planetDefs = [
  { section:'about', color:0x4fc3f7, size:1.8, orbit:10, speed:0.4, emissive:0x1a5276, label:'About' },
  { section:'skills', color:0x66bb6a, size:1.5, orbit:14, speed:0.3, emissive:0x1b5e20, label:'Skills' },
  { section:'projects', color:0xffa726, size:2.2, orbit:19, speed:0.22, emissive:0x7f3300, label:'Projects' },
  { section:'experience', color:0xef5350, size:1.6, orbit:24, speed:0.17, emissive:0x7f0000, label:'Experience' },
  { section:'education', color:0xab47bc, size:1.4, orbit:28, speed:0.13, emissive:0x4a148c, label:'Education' },
  { section:'certificates', color:0x26c6da, size:1.2, orbit:32, speed:0.1, emissive:0x00695c, label:'Certificates' },
  { section:'coding', color:0xffee58, size:1.3, orbit:36, speed:0.08, emissive:0x6d5f00, label:'Coding' },
  { section:'contact', color:0xec407a, size:1.7, orbit:40, speed:0.06, emissive:0x7f0035, label:'Contact' },
];

// Sun (center)
const sunGeo = new THREE.SphereGeometry(3.5, 48, 48);
const sunMat = new THREE.MeshBasicMaterial({ color:0xffcc33 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
scene.add(sunMesh);

// Sun glow
const sunGlowGeo = new THREE.SphereGeometry(4.5, 32, 32);
const sunGlowMat = new THREE.MeshBasicMaterial({ color:0xffaa00, transparent:true, opacity:0.15 });
scene.add(new THREE.Mesh(sunGlowGeo, sunGlowMat));

// Create planets
const planets = [];
const uiLayer = document.getElementById('ui-layer');

planetDefs.forEach((def, i) => {
  // Orbit ring
  const orbitGeo = new THREE.RingGeometry(def.orbit-0.03, def.orbit+0.03, 128);
  const orbitMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.06, side:THREE.DoubleSide });
  const orbitMesh = new THREE.Mesh(orbitGeo, orbitMat);
  orbitMesh.rotation.x = -Math.PI/2;
  scene.add(orbitMesh);

  // Planet
  const geo = new THREE.SphereGeometry(def.size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color:def.color, emissive:def.emissive, emissiveIntensity:0.4, roughness:0.7, metalness:0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Planet glow
  const glowGeo = new THREE.SphereGeometry(def.size*1.3, 24, 24);
  const glowMat = new THREE.MeshBasicMaterial({ color:def.color, transparent:true, opacity:0.08 });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glowMesh);

  // Label
  const label = document.createElement('div');
  label.className = 'planet-label';
  label.textContent = def.label;
  uiLayer.appendChild(label);

  const angle = (i / planetDefs.length) * Math.PI * 2 + Math.random() * 0.5;
  planets.push({ ...def, mesh, glowMesh, orbitMesh, label, angle });
});

// Raycaster for clicking planets
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = planets.map(p => p.mesh);
  const intersects = raycaster.intersectObjects(meshes);
  if (intersects.length > 0) {
    const planet = planets.find(p => p.mesh === intersects[0].object);
    if (planet) openSection(planet.section);
  }
});

// Camera controls (orbit with mouse drag)
let isDragging = false, prevMouse = {x:0,y:0};
let cameraTheta = 0.3, cameraPhi = 0.8, cameraRadius = 60;
let targetTheta = cameraTheta, targetPhi = cameraPhi, targetRadius = cameraRadius;

canvas.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = {x:e.clientX,y:e.clientY}; });
canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  targetTheta -= dx * 0.005;
  targetPhi = Math.max(0.2, Math.min(Math.PI/2 - 0.05, targetPhi - dy * 0.005));
  prevMouse = {x:e.clientX,y:e.clientY};
});
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);
canvas.addEventListener('wheel', (e) => {
  targetRadius = Math.max(20, Math.min(120, targetRadius + e.deltaY * 0.05));
});

// Touch controls
let touchStartDist = 0;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) { isDragging = true; prevMouse = {x:e.touches[0].clientX,y:e.touches[0].clientY}; }
  if (e.touches.length === 2) { touchStartDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
}, {passive:true});
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x, dy = e.touches[0].clientY - prevMouse.y;
    targetTheta -= dx * 0.005;
    targetPhi = Math.max(0.2, Math.min(Math.PI/2 - 0.05, targetPhi - dy * 0.005));
    prevMouse = {x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    targetRadius = Math.max(20, Math.min(120, targetRadius - (dist - touchStartDist) * 0.1));
    touchStartDist = dist;
  }
}, {passive:true});
canvas.addEventListener('touchend', () => isDragging = false);

// Project to screen
function toScreen(pos) {
  const v = pos.clone().project(camera);
  return { x: (v.x * 0.5 + 0.5) * window.innerWidth, y: (-v.y * 0.5 + 0.5) * window.innerHeight, z: v.z };
}

// --- SECTION CONTENT ---
function getPanelHTML(section) {
  const c = getConfig();
  const accent = c.primary_action || defaultConfig.primary_action;

  switch(section) {
    case 'about': return `
      <div class="panel-section-tag" style="color:${accent}">About Me</div>
      <div class="panel-title">${c.your_name || defaultConfig.your_name}</div>
      <p class="panel-text">${c.about_text || defaultConfig.about_text}</p>
      <div class="panel-divider"></div>
      <div class="placeholder-item">📷 Your Photo Here</div>
      <p class="panel-text" style="font-size:13px;margin-top:16px;opacity:0.5;">Add your profile photo by editing this section</p>`;

    case 'skills': return `
      <div class="panel-section-tag" style="color:${accent}">Skills</div>
      <div class="panel-title">Technical Skills</div>
      <p class="panel-text" style="margin-bottom:16px;">Add your skills below:</p>
      <div>
        <div class="skill-tag">Skill 1</div>
        <div class="skill-tag">Skill 2</div>
        <div class="skill-tag">Skill 3</div>
        <div class="skill-tag">Skill 4</div>
        <div class="skill-tag">Skill 5</div>
        <div class="skill-tag">Skill 6</div>
        <div class="skill-tag">Skill 7</div>
        <div class="skill-tag">Skill 8</div>
      </div>
      <p class="panel-text" style="font-size:13px;margin-top:20px;opacity:0.4;">Replace these with your actual skills</p>`;

    case 'projects': return `
      <div class="panel-section-tag" style="color:${accent}">Projects</div>
      <div class="panel-title">Featured Work</div>
      <div class="project-card"><h4>${c.project1_title || defaultConfig.project1_title}</h4><p>${c.project1_desc || defaultConfig.project1_desc}</p></div>
      <div class="project-card"><h4>${c.project2_title || defaultConfig.project2_title}</h4><p>${c.project2_desc || defaultConfig.project2_desc}</p></div>
      <div class="project-card"><h4>${c.project3_title || defaultConfig.project3_title}</h4><p>${c.project3_desc || defaultConfig.project3_desc}</p></div>`;

    case 'experience': return `
      <div class="panel-section-tag" style="color:${accent}">Experience</div>
      <div class="panel-title">Work Experience</div>
      <p class="panel-text">${c.experience_text || defaultConfig.experience_text}</p>
      <div class="panel-divider"></div>
      <p class="panel-text" style="font-size:13px;opacity:0.4;">Add your detailed work experience here</p>`;

    case 'education': return `
      <div class="panel-section-tag" style="color:${accent}">Education</div>
      <div class="panel-title">Education</div>
      <div class="project-card"><h4>${c.education_text || defaultConfig.education_text}</h4><p>Add your university, year, GPA, and other details</p></div>`;

    case 'certificates': return `
      <div class="panel-section-tag" style="color:${accent}">Certificates</div>
      <div class="panel-title">Certifications</div>
      <div class="placeholder-item">🏆 Certificate 1 — Add details</div>
      <div class="placeholder-item">🏆 Certificate 2 — Add details</div>
      <div class="placeholder-item">🏆 Certificate 3 — Add details</div>
      <p class="panel-text" style="font-size:13px;margin-top:16px;opacity:0.4;">Replace with your actual certifications</p>`;

    case 'coding': return `
      <div class="panel-section-tag" style="color:${accent}">Coding Platforms</div>
      <div class="panel-title">Competitive Coding</div>
      <div class="placeholder-item">💻 LeetCode — Add your profile</div>
      <div class="placeholder-item">💻 HackerRank — Add your profile</div>
      <div class="placeholder-item">💻 CodeForces — Add your profile</div>
      <div class="placeholder-item">💻 GeeksForGeeks — Add your profile</div>
      <p class="panel-text" style="font-size:13px;margin-top:16px;opacity:0.4;">Replace with your coding platform profiles & stats</p>`;

    case 'contact': return `
      <div class="panel-section-tag" style="color:${accent}">Get In Touch</div>
      <div class="panel-title">Contact</div>
      <a href="mailto:${c.email_address || defaultConfig.email_address}" class="contact-link" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><i data-lucide="mail" style="width:20px;height:20px;"></i></div>
        <span>${c.email_address || defaultConfig.email_address}</span>
      </a>
      <a href="${c.github_url || defaultConfig.github_url}" class="contact-link" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><i data-lucide="github" style="width:20px;height:20px;"></i></div>
        <span>GitHub Profile</span>
      </a>
      <a href="${c.linkedin_url || defaultConfig.linkedin_url}" class="contact-link" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><i data-lucide="linkedin" style="width:20px;height:20px;"></i></div>
        <span>LinkedIn Profile</span>
      </a>
      <div class="panel-divider"></div>
      <p class="panel-text" style="font-size:13px;opacity:0.4;">Add more contact details as needed</p>`;

    default: return '';
  }
}

function openSection(section) {
  currentSection = section;
  const panel = document.getElementById('detail-panel');
  const hero = document.getElementById('hero-overlay');

  if (section === 'home') {
    panel.classList.remove('open');
    hero.style.opacity = '1';
    targetRadius = 60;
  } else {
    document.getElementById('panel-content').innerHTML = getPanelHTML(section);
    panel.classList.add('open');
    hero.style.opacity = '0';
    // Focus camera toward planet
    const planet = planets.find(p => p.section === section);
    if (planet) targetRadius = Math.max(25, planet.orbit * 0.8);
    lucide.createIcons();
  }
  // Update nav
  document.querySelectorAll('.nav-link').forEach(l => {
    l.classList.toggle('active', l.dataset.section === section);
  });
}

// Nav clicks
document.querySelectorAll('.nav-link').forEach(btn => {
  btn.addEventListener('click', () => {
    openSection(btn.dataset.section);
    document.getElementById('nav-links').classList.remove('show');
  });
});
document.getElementById('panel-close').addEventListener('click', () => openSection('home'));
document.getElementById('mobile-menu-btn').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('show');
});

// --- ANIMATION LOOP ---
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.008;

  // Update planet positions
  planets.forEach(p => {
    p.angle += p.speed * 0.008;
    const x = Math.cos(p.angle) * p.orbit;
    const z = Math.sin(p.angle) * p.orbit;
    p.mesh.position.set(x, 0, z);
    p.glowMesh.position.set(x, 0, z);
    p.mesh.rotation.y += 0.01;

    // Update label position
    const screen = toScreen(new THREE.Vector3(x, p.size + 1.5, z));
    if (screen.z < 1 && screen.z > -1) {
      p.label.style.left = screen.x + 'px';
      p.label.style.top = screen.y + 'px';
      p.label.style.display = 'block';
    } else {
      p.label.style.display = 'none';
    }
  });

  // Sun pulse
  sunMesh.scale.setScalar(1 + Math.sin(time * 2) * 0.03);

  // Smooth camera
  cameraTheta += (targetTheta - cameraTheta) * 0.05;
  cameraPhi += (targetPhi - cameraPhi) * 0.05;
  cameraRadius += (targetRadius - cameraRadius) * 0.03;
  camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
  camera.position.y = cameraRadius * Math.cos(cameraPhi);
  camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('hero-name').textContent = c.your_name;
  document.getElementById('hero-title').textContent = c.your_title;
  document.getElementById('nav-brand').textContent = c.your_name.toUpperCase();

  const ff = c.font_family || defaultConfig.font_family;
  document.body.style.fontFamily = `${ff}, Outfit, sans-serif`;

  document.documentElement.style.setProperty('--accent', c.primary_action);

  // Re-render open panel
  if (currentSection !== 'home') {
    document.getElementById('panel-content').innerHTML = getPanelHTML(currentSection);
    lucide.createIcons();
  }
}
