<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliCulture - Employee Activity Tracker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; width: 100%; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes progressFill { from { width: 0%; } to { width: var(--target-width); } }

    .animate-slide { animation: slideIn 0.5s ease-out; }
    .animate-fade { animation: fadeIn 0.3s ease-in; }
    .glow-pulse { animation: pulse-glow 2s infinite; }

    .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 12px; }
    .glass-card:hover { border-color: rgba(148, 163, 184, 0.2); background: rgba(30, 41, 59, 0.95); transition: all 0.3s ease; }

    .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary { background: rgba(51, 65, 85, 0.8); color: #e2e8f0; padding: 10px 20px; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .btn-secondary:hover { background: rgba(71, 85, 105, 0.8); border-color: rgba(148, 163, 184, 0.4); }

    .btn-success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 13px; }
    .btn-success:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(34, 197, 94, 0.3); }

    input, textarea, select { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(148, 163, 184, 0.2); color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 14px; transition: all 0.3s ease; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; background: rgba(15, 23, 42, 0.95); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

    .badge { display: inline-block; padding: 4px 12px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(96, 165, 250, 0.3); }
    .badge-success { background: rgba(34, 197, 94, 0.2); color: #4ade80; border-color: rgba(74, 222, 128, 0.3); }
    .badge-warning { background: rgba(251, 146, 60, 0.2); color: #fb923c; border-color: rgba(251, 146, 60, 0.3); }
    .badge-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border-color: rgba(248, 113, 113, 0.3); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.6); }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 16px; padding: 30px; max-width: 500px; width: 90%; animation: slideIn 0.3s ease-out; }

    .stat-box { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%); border: 1px solid rgba(59, 130, 246, 0.2); padding: 20px; border-radius: 12px; text-align: center; }
    .stat-box .value { font-size: 28px; font-weight: bold; color: #60a5fa; margin: 10px 0; }
    .stat-box .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

    /* ── PROGRESS BAR ── */
    .progress-track { width: 100%; background: rgba(15, 23, 42, 0.6); border-radius: 999px; height: 10px; overflow: hidden; border: 1px solid rgba(148, 163, 184, 0.1); }
    .progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-fill.p0   { background: linear-gradient(90deg, #475569, #64748b); width: 0%; }
    .progress-fill.p10  { background: linear-gradient(90deg, #ef4444, #f87171); width: 10%; }
    .progress-fill.p20  { background: linear-gradient(90deg, #ef4444, #fb923c); width: 20%; }
    .progress-fill.p30  { background: linear-gradient(90deg, #f97316, #fbbf24); width: 30%; }
    .progress-fill.p40  { background: linear-gradient(90deg, #f59e0b, #fbbf24); width: 40%; }
    .progress-fill.p50  { background: linear-gradient(90deg, #eab308, #facc15); width: 50%; }
    .progress-fill.p60  { background: linear-gradient(90deg, #84cc16, #a3e635); width: 60%; }
    .progress-fill.p70  { background: linear-gradient(90deg, #22c55e, #4ade80); width: 70%; }
    .progress-fill.p80  { background: linear-gradient(90deg, #16a34a, #22c55e); width: 80%; }
    .progress-fill.p90  { background: linear-gradient(90deg, #0ea5e9, #38bdf8); width: 90%; }
    .progress-fill.p100 { background: linear-gradient(90deg, #3b82f6, #06b6d4); width: 100%; }

    .progress-fill-dynamic {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Task card in HR portal */
    .task-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 10px; padding: 16px; transition: all 0.3s ease; }
    .task-card:hover { border-color: rgba(59, 130, 246, 0.3); background: rgba(15, 23, 42, 0.9); }
    .task-card.completed { border-color: rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.04); }

    /* Update log entry */
    .update-log-entry { background: rgba(15, 23, 42, 0.5); border-left: 3px solid #3b82f6; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 13px; }
    .update-log-entry.latest { border-left-color: #22c55e; }

    /* Range slider styling */
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 5px; background: rgba(148, 163, 184, 0.2); outline: none; padding: 0; border: none; box-shadow: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: none; }

    /* Pulse dot for live updates */
    @keyframes livePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.3); } }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; animation: livePulse 1.5s infinite; }

    /* Tab nav */
    .tab-btn { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s ease; }
    .tab-btn.active { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .tab-btn.inactive { background: rgba(51, 65, 85, 0.5); color: #94a3b8; }
    .tab-btn.inactive:hover { background: rgba(71, 85, 105, 0.7); color: #e2e8f0; }

    /* Notification panel */
    .notification-panel { position: absolute; right: 0; margin-top: 8px; width: 384px; background: #1e293b; border: 1px solid rgba(100,116,139,0.5); border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 50; max-height: 384px; overflow-y: auto; }
  </style>
 </head>
 <body>
  <div id="app" class="h-full w-full overflow-hidden"></div>
  <script>
  // ============================================
  // PERFORMANCE AI ENGINE
  // ============================================
  class PerformanceAI {
    static calculatePerformanceScore(employee) {
      const weights = { gitCommits: 0.25, tasksCompleted: 0.25, meetingsAttended: 0.15, jiraTickets: 0.15, workHours: 0.20 };
      const maxMetrics = { gitCommits: 100, tasksCompleted: 50, meetingsAttended: 30, jiraTickets: 50, workHours: 160 };
      let score = 0;
      for (const [metric, weight] of Object.entries(weights)) {
        const normalized = Math.min(employee[metric] || 0, maxMetrics[metric]) / maxMetrics[metric];
        score += normalized * weight * 100;
      }
      return Math.round(score);
    }
    static detectBurnout(employee) {
      const workHours = employee.workHours || 0;
      const consistency = employee.streak || 0;
      const lastActive = new Date(employee.lastActive || new Date());
      const daysSinceActive = Math.floor((Date.now() - lastActive) / (1000 * 60 * 60 * 24));
      let burnoutScore = 0;
      if (workHours > 50) burnoutScore += 30;
      if (workHours < 20) burnoutScore += 20;
      if (consistency < 5) burnoutScore += 20;
      if (daysSinceActive > 3) burnoutScore += 30;
      if (burnoutScore >= 60) return 'high';
      if (burnoutScore >= 40) return 'medium';
      return 'low';
    }
    static generateTrendAnalysis(employee) {
      const trend = { trajectory: 'stable', prediction: 'likely_to_maintain', insights: [] };
      const score = this.calculatePerformanceScore(employee);
      if (employee.streak > 7) { trend.trajectory = 'upward'; trend.prediction = 'likely_to_improve'; trend.insights.push('🚀 Strong momentum with current streak'); }
      else if (employee.streak > 3) { trend.trajectory = 'stable'; trend.prediction = 'likely_to_maintain'; trend.insights.push('✅ Steady performance'); }
      else { trend.trajectory = 'downward'; trend.prediction = 'needs_attention'; trend.insights.push('⚠️ Recent activity drop detected'); }
      if (score > 80) trend.insights.push('⭐ Top performer');
      if (employee.workHours > 50) trend.insights.push('⏰ Consider workload balance');
      return trend;
    }
    static generateInsights(employee) {
      const insights = [];
      const score = this.calculatePerformanceScore(employee);
      const burnout = this.detectBurnout(employee);
      if (score > 85) insights.push({ type: 'positive', text: '🌟 Exceptional contributor! Keep maintaining this pace.', emoji: '⭐' });
      if (burnout === 'high') insights.push({ type: 'warning', text: '🔥 Burnout risk detected. Consider workload adjustment.', emoji: '⚠️' });
      if (employee.gitCommits < 5) insights.push({ type: 'suggestion', text: '💡 Increase code contributions for better visibility.', emoji: '💭' });
      if (employee.meetingsAttended > 15) insights.push({ type: 'suggestion', text: '📅 Consider reducing meetings to focus on deliverables.', emoji: '💭' });
      return insights;
    }
    static findBestEmployee(taskTitle, taskPriority, employees) {
      const taskLower = taskTitle.toLowerCase();
      const skillMap = {
        'frontend': { skill: 'frontend', weight: 1 }, 'backend': { skill: 'backend', weight: 1 },
        'design': { skill: 'design', weight: 1 }, 'api': { skill: 'backend', weight: 0.8 },
        'database': { skill: 'backend', weight: 0.9 }, 'authentication': { skill: 'backend', weight: 0.85 },
        'ui': { skill: 'frontend', weight: 0.9 }, 'bug': { skill: 'general', weight: 0.7 },
        'feature': { skill: 'general', weight: 0.8 }, 'test': { skill: 'general', weight: 0.6 },
        'documentation': { skill: 'general', weight: 0.5 }, 'review': { skill: 'general', weight: 0.7 }
      };
      const scoredEmployees = employees
        .filter(emp => { const assignedTasks = State.tasks.filter(t => t.taskAssignedTo === emp.email).length; return assignedTasks < 5; })
        .map(emp => {
          let score = 0;
          const perfScore = this.calculatePerformanceScore(emp);
          const burnout = this.detectBurnout(emp);
          score += perfScore * 0.4;
          if (burnout === 'high') score -= 30;
          if (burnout === 'medium') score -= 10;
          if (taskPriority === 'critical') score += perfScore > 75 ? 20 : perfScore > 60 ? 10 : 0;
          else if (taskPriority === 'high') score += perfScore > 70 ? 15 : perfScore > 50 ? 5 : 0;
          for (const [keyword, skillData] of Object.entries(skillMap)) {
            if (taskLower.includes(keyword)) {
              if (skillData.skill === 'frontend' && emp.gitCommits > 20) score += 15 * skillData.weight;
              else if (skillData.skill === 'backend' && emp.jiraTickets > 15) score += 15 * skillData.weight;
              else if (skillData.skill === 'design' && emp.meetingsAttended > 15) score += 10 * skillData.weight;
              else if (skillData.skill === 'general') score += 5 * skillData.weight;
            }
          }
          score += emp.streak * 1.5;
          const currentTasks = State.tasks.filter(t => t.taskAssignedTo === emp.email).length;
          score += (5 - currentTasks) * 2;
          return { employee: emp, score: Math.max(0, score), reason: this.generateMatchReason(emp, taskTitle, perfScore, burnout) };
        })
        .sort((a, b) => b.score - a.score);
      return scoredEmployees[0] || null;
    }
    static generateMatchReason(employee, taskTitle, perfScore, burnout) {
      const reasons = [];
      if (perfScore > 80) reasons.push('Top performer');
      else if (perfScore > 60) reasons.push('Strong performer');
      if (employee.streak > 5) reasons.push(`${employee.streak}-day streak`);
      const currentTasks = State.tasks.filter(t => t.taskAssignedTo === employee.email).length;
      if (currentTasks < 2) reasons.push('Light workload');
      if (burnout === 'low') reasons.push('Good health');
      if (employee.gitCommits > 30) reasons.push('Strong coder');
      return reasons.slice(0, 3).join(' • ');
    }
  }

  // ============================================
  // GAMIFICATION ENGINE
  // ============================================
  class GamificationEngine {
    static awardBadges(employee) {
      const badges = [];
      const score = PerformanceAI.calculatePerformanceScore(employee);
      if (score > 90) badges.push({ name: 'superstar', icon: '⭐', label: 'Superstar' });
      if (employee.streak > 14) badges.push({ name: 'flame', icon: '🔥', label: '14-Day Streak' });
      if (employee.gitCommits > 50) badges.push({ name: 'coder', icon: '💻', label: 'Code Master' });
      if (employee.tasksCompleted > 30) badges.push({ name: 'taskforce', icon: '✅', label: 'Task Force' });
      if (employee.meetingsAttended > 20) badges.push({ name: 'connector', icon: '🤝', label: 'Team Connector' });
      return badges;
    }
    static calculateLeaderboardPosition(employees) {
      return employees
        .map(emp => ({ ...emp, score: PerformanceAI.calculatePerformanceScore(emp) }))
        .sort((a, b) => b.score - a.score)
        .map((emp, idx) => ({ ...emp, rank: idx + 1, medal: idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '' }));
    }
  }

  // ============================================
  // CHATBOT ENGINE
  // ============================================
  class ChatbotEngine {
    static generateResponse(query, employees, currentUser) {
      const lowerQuery = query.toLowerCase();
      if (lowerQuery.includes('performance') || lowerQuery.includes('how am i')) {
        const user = employees.find(e => e.email === currentUser.email);
        const score = PerformanceAI.calculatePerformanceScore(user);
        return `📊 Your performance score: ${score}/100. You've completed ${user.tasksCompleted} tasks with ${user.gitCommits} commits. ${score > 80 ? '🌟 Excellent work!' : 'Keep pushing! 💪'}`;
      }
      if (lowerQuery.includes('top performer') || lowerQuery.includes('best')) {
        const leaderboard = GamificationEngine.calculateLeaderboardPosition(employees);
        const topEmp = leaderboard[0];
        return `🏆 ${topEmp.name} is leading with ${topEmp.score} points! Great performance this month.`;
      }
      if (lowerQuery.includes('burnout') || lowerQuery.includes('stress')) {
        const user = employees.find(e => e.email === currentUser.email);
        const burnout = PerformanceAI.detectBurnout(user);
        return `${burnout === 'high' ? '🔥 High burnout risk detected. Take a break!' : '✅ You\'re doing fine. Keep the balance! 😊'}`;
      }
      if (lowerQuery.includes('task') || lowerQuery.includes('progress')) {
        const myTasks = State.tasks.filter(t => t.taskAssignedTo === currentUser.email);
        if (myTasks.length === 0) return '📋 No tasks assigned to you yet.';
        const avgProgress = Math.round(myTasks.reduce((a, t) => a + (t.progress || 0), 0) / myTasks.length);
        return `📋 You have ${myTasks.length} task(s). Average progress: ${avgProgress}%. Keep updating your progress so HR stays informed! 🚀`;
      }
      return '🤖 I can help! Try asking about your performance, top performers, burnout risk, tasks, or goals.';
    }
    static generateHRResponse(query, employees, tasks = []) {
      const lowerQuery = query.toLowerCase();
      if (lowerQuery.includes('task progress') || lowerQuery.includes('task update') || lowerQuery.includes('progress')) {
        const assigned = tasks.filter(t => t.taskAssignedTo);
        if (assigned.length === 0) return '📋 No tasks assigned yet.';
        let analysis = `📊 <strong>Task Progress Overview (${assigned.length} tasks):</strong><br>`;
        assigned.forEach(t => {
          const emp = employees.find(e => e.email === t.taskAssignedTo);
          const progress = t.progress || 0;
          const statusIcon = progress === 100 ? '✅' : progress >= 70 ? '🟢' : progress >= 40 ? '🟡' : '🔴';
          analysis += `${statusIcon} <strong>${t.taskTitle}</strong> → ${emp ? emp.name : 'Unassigned'} (${progress}%)<br>`;
          if (t.progressNote) analysis += `&nbsp;&nbsp;💬 "${t.progressNote}"<br>`;
        });
        const avgProgress = Math.round(assigned.reduce((a, t) => a + (t.progress || 0), 0) / assigned.length);
        analysis += `<br>📈 Average completion: <strong>${avgProgress}%</strong>`;
        return analysis;
      }
      if (lowerQuery.includes('remove') || lowerQuery.includes('fire') || lowerQuery.includes('underperforming')) {
        const underperforming = employees.filter(e => PerformanceAI.calculatePerformanceScore(e) < 40);
        if (underperforming.length === 0) return `✅ <strong>Good News!</strong><br>No severely underperforming employees detected.`;
        let analysis = `⚠️ <strong>Low Performance Employees (${underperforming.length}):</strong><br>`;
        analysis += underperforming.map(e => { const score = PerformanceAI.calculatePerformanceScore(e); return `• <strong>${e.name}</strong><br>&nbsp;&nbsp;Score: ${score}/100<br>&nbsp;&nbsp;Recommendation: Consider training or performance plan`; }).join('<br>');
        return analysis;
      }
      if (lowerQuery.includes('top') && (lowerQuery.includes('performer') || lowerQuery.includes('employee'))) {
        const leaderboard = GamificationEngine.calculateLeaderboardPosition(employees);
        const top3 = leaderboard.slice(0, 3);
        return `🏆 <strong>Top 3 Performers:</strong><br>${top3.map((emp, i) => `${i+1}. ${emp.name} - ${emp.score} points (${emp.department})`).join('<br>')}`;
      }
      if (lowerQuery.includes('burnout') || lowerQuery.includes('risk')) {
        const atRisk = employees.filter(e => PerformanceAI.detectBurnout(e) === 'high');
        if (atRisk.length === 0) return '✅ No employees with high burnout risk detected.';
        let analysis = `🔥 <strong>High Burnout Risk (${atRisk.length}):</strong><br>`;
        analysis += atRisk.map(e => `• ${e.name} - ${e.workHours}h/week, Streak: ${e.streak} days`).join('<br>');
        return analysis;
      }
      if (lowerQuery.includes('average') || lowerQuery.includes('avg')) {
        const avgScore = Math.round(employees.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / employees.length);
        return `📊 <strong>Team Averages:</strong><br>Commits: ${Math.round(employees.reduce((a,e)=>a+e.gitCommits,0)/employees.length)}<br>Tasks: ${Math.round(employees.reduce((a,e)=>a+e.tasksCompleted,0)/employees.length)}<br>Performance Score: ${avgScore}/100`;
      }
      return '💡 <strong>I can help with:</strong><br>• Task progress updates<br>• Employee performance analysis<br>• Burnout risk detection<br>• Team averages & trends<br>• Top performers';
    }
  }

  // ============================================
  // STATE MANAGEMENT
  // ============================================
  const State = {
    users: [], employees: [], tasks: [], notifications: [], feedback: [],
    currentUser: null, currentView: 'auth',

    init() { this.loadDefaultData(); },

    loadDefaultData() {
      this.users = [

        { id: '3', email: 'bob@dev.com', password: 'emp123', name: 'Bob Chen', role: 'employee', department: 'Engineering', createdAt: new Date().toISOString() },
        { id: '4', email: 'carol@dev.com', password: 'emp123', name: 'Carol Smith', role: 'employee', department: 'Product', createdAt: new Date().toISOString() }
      ];
      this.employees = [
        { id: '2', email: 'alice@dev.com', name: 'Alice Kumar', role: 'employee', department: 'Engineering', gitCommits: 45, tasksCompleted: 28, meetingsAttended: 12, jiraTickets: 32, workHours: 38, lastActive: new Date(Date.now() - 1000*60*30).toISOString(), score: 85, streak: 8, badges: 'superstar,coder', burnoutRisk: 'low', createdAt: new Date().toISOString() },
        { id: '3', email: 'bob@dev.com', name: 'Bob Chen', role: 'employee', department: 'Engineering', gitCommits: 28, tasksCompleted: 22, meetingsAttended: 18, jiraTickets: 20, workHours: 42, lastActive: new Date(Date.now() - 1000*60*120).toISOString(), score: 72, streak: 5, badges: '', burnoutRisk: 'medium', createdAt: new Date().toISOString() },
        { id: '4', email: 'carol@dev.com', name: 'Carol Smith', role: 'employee', department: 'Product', gitCommits: 12, tasksCompleted: 35, meetingsAttended: 22, jiraTickets: 28, workHours: 52, lastActive: new Date(Date.now() - 1000*60*300).toISOString(), score: 78, streak: 3, badges: 'taskforce', burnoutRisk: 'high', createdAt: new Date().toISOString() }
      ];
      // Tasks now include progress fields
      this.tasks = [
        { id: '1', taskTitle: 'Fix authentication bug', taskAssignedTo: 'alice@dev.com', taskPriority: 'high', taskStatus: 'in-progress', progress: 65, progressNote: 'Identified root cause, implementing fix now', progressUpdatedAt: new Date(Date.now() - 1000*60*45).toISOString(), progressLog: [{ progress: 20, note: 'Started investigation', timestamp: new Date(Date.now() - 1000*60*180).toISOString() }, { progress: 65, note: 'Identified root cause, implementing fix now', timestamp: new Date(Date.now() - 1000*60*45).toISOString() }], createdAt: new Date().toISOString() },

      ];
    },

    login(email, password) {
      const user = this.users.find(u => u.email === email && u.password === password);
      if (user) { this.currentUser = user; this.currentView = user.role === 'hr' ? 'hr-dashboard' : 'employee-dashboard'; return true; }
      return false;
    },

    signup(email, password, name, role, department) {
      if (this.users.find(u => u.email === email)) return false;
      const newUser = { id: String(this.users.length + 1), email, password, name, role, department: department || 'General', createdAt: new Date().toISOString() };
      this.users.push(newUser);
      if (role === 'employee') {
        this.employees.push({ id: newUser.id, email, name, role: 'employee', department, gitCommits: 0, tasksCompleted: 0, meetingsAttended: 0, jiraTickets: 0, workHours: 0, lastActive: new Date().toISOString(), score: 0, streak: 0, badges: '', burnoutRisk: 'low', createdAt: new Date().toISOString() });
      }
      return true;
    },

    updateTaskProgress(taskId, newProgress, note) {
      const task = this.tasks.find(t => t.id === taskId);
      if (!task) return false;
      task.progress = newProgress;
      task.progressNote = note;
      task.progressUpdatedAt = new Date().toISOString();
      if (!task.progressLog) task.progressLog = [];
      task.progressLog.push({ progress: newProgress, note, timestamp: new Date().toISOString() });
      if (newProgress === 100) task.taskStatus = 'completed';
      else if (newProgress > 0) task.taskStatus = 'in-progress';
      // Add notification for HR
      const emp = this.employees.find(e => e.email === task.taskAssignedTo);
      this.notifications.push({
        id: String(this.notifications.length + 1),
        notificationMessage: `${emp ? emp.name : 'Employee'} updated "${task.taskTitle}" to ${newProgress}%`,
        notificationType: 'progress',
        isRead: false,
        createdAt: new Date().toISOString()
      });
      return true;
    }
  };

  // ============================================
  // PROGRESS HELPERS
  // ============================================
  function getProgressColor(p) {
    if (p === 100) return '#3b82f6';
    if (p >= 70) return '#22c55e';
    if (p >= 40) return '#eab308';
    if (p >= 10) return '#f97316';
    return '#475569';
  }
  function getProgressLabel(p) {
    if (p === 100) return '✅ Done';
    if (p >= 80) return '🔵 Almost done';
    if (p >= 60) return '🟢 Good progress';
    if (p >= 40) return '🟡 In progress';
    if (p >= 10) return '🟠 Just started';
    return '⬜ Not started';
  }
  function timeAgo(isoStr) {
    if (!isoStr) return 'Never';
    const diff = Date.now() - new Date(isoStr);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs/24)}d ago`;
  }

    // ── SLIDER INTERACTIONS ──────────────────────
    static onSliderInput(taskId, val) {
      const intVal = parseInt(val);
      const color = getProgressColor(intVal);
      const el = document.getElementById(`slider-val-${taskId}`);
      if (el) { el.textContent = intVal + '%'; el.style.color = color; }
    }

    static setSlider(taskId, val) {
      const slider = document.getElementById(`progress-slider-${taskId}`);
      if (slider) { slider.value = val; this.onSliderInput(taskId, val); }
    }

    static submitProgressUpdate(taskId) {
      const slider = document.getElementById(`progress-slider-${taskId}`);
      const noteEl = document.getElementById(`progress-note-${taskId}`);
      if (!slider) return;

      const newProgress = parseInt(slider.value);
      const note = noteEl ? noteEl.value.trim() : '';

      if (!note) {
        noteEl.focus();
        noteEl.style.borderColor = '#ef4444';
        noteEl.placeholder = '⚠️ Please add a note describing what you\'ve done...';
        setTimeout(() => { noteEl.style.borderColor = ''; noteEl.placeholder = 'Add a note about your progress...'; }, 3000);
        return;
      }

      State.updateTaskProgress(taskId, newProgress, note);

      // Show toast
      this.showToast(`✅ Progress updated to ${newProgress}%! HR has been notified.`, 'success');
      this.render();
    }

    static showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        background: ${type === 'success' ? 'linear-gradient(135deg,#16a34a,#22c55e)' : 'linear-gradient(135deg,#2563eb,#3b82f6)'};
        color: white; padding: 14px 24px; border-radius: 12px; font-weight: 600;
        z-index: 9999; animation: slideIn 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        max-width: 90vw; text-align: center;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    // ── EVENT LISTENERS ──────────────────────────
    static attachEventListeners() {
      // Auth
      document.getElementById('login-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email')?.value || '';
        const password = document.getElementById('login-password')?.value || '';
        if (!email || !password) { alert('Please enter email and password'); return; }
        if (State.login(email, password)) this.render();
        else alert('Invalid credentials. Try hr@intelliculture.com / hr123');
      });
      document.getElementById('login-password')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
      document.getElementById('signup-toggle')?.addEventListener('click', () => { State.currentView = 'signup'; this.render(); });
      document.getElementById('signup-role')?.addEventListener('change', (e) => { document.getElementById('department-field').style.display = e.target.value === 'employee' ? 'block' : 'none'; });
      document.getElementById('signup-btn')?.addEventListener('click', () => {
        const name = document.getElementById('signup-name').value, email = document.getElementById('signup-email').value,
          password = document.getElementById('signup-password').value, role = document.getElementById('signup-role').value,
          department = document.getElementById('signup-department')?.value || 'General';
        if (name && email && password && role) { if (State.signup(email, password, name, role, department)) { alert('Account created! Please login.'); State.currentView = 'auth'; this.render(); } else alert('Email already exists'); }
        else alert('Please fill all fields');
      });
      document.getElementById('back-to-login')?.addEventListener('click', () => { State.currentView = 'auth'; this.render(); });
      document.getElementById('logout-btn')?.addEventListener('click', () => { State.currentUser = null; State.currentView = 'auth'; this.render(); });

      // HR - Employee rows
      document.querySelectorAll('.employee-row').forEach(row => { row.addEventListener('click', () => this.showEmployeeDetail(row.dataset.email)); });

      // HR - Task detail click
      document.querySelectorAll('.hr-task-detail-btn').forEach(btn => { btn.addEventListener('click', () => this.showHRTaskDetail(btn.dataset.taskId)); });

      // Assign task
      document.getElementById('assign-task-btn')?.addEventListener('click', () => { document.getElementById('task-assign-modal').style.display = 'flex'; document.getElementById('ai-suggestion').classList.add('hidden'); document.getElementById('task-title').value = ''; });
      document.getElementById('close-task-modal')?.addEventListener('click', () => { document.getElementById('task-assign-modal').style.display = 'none'; });
      document.getElementById('auto-assign-btn')?.addEventListener('click', () => {
        const taskTitle = document.getElementById('task-title').value;
        const taskPriority = document.getElementById('task-priority').value;
        if (!taskTitle.trim()) { alert('Please enter a task title first'); return; }
        const suggestion = PerformanceAI.findBestEmployee(taskTitle, taskPriority, State.employees);
        if (suggestion) {
          document.getElementById('suggested-employee').textContent = suggestion.employee.name;
          document.getElementById('suggested-reason').textContent = suggestion.reason;
          document.getElementById('ai-suggestion').classList.remove('hidden');
          document.getElementById('task-assign-to').value = suggestion.employee.email;
          window.currentSuggestion = suggestion.employee.email;
        } else alert('No suitable employee found.');
      });
      document.getElementById('accept-suggestion-btn')?.addEventListener('click', () => { document.getElementById('task-assign-to').value = window.currentSuggestion; document.getElementById('create-task-btn').click(); });
      document.getElementById('reject-suggestion-btn')?.addEventListener('click', () => { document.getElementById('ai-suggestion').classList.add('hidden'); document.getElementById('task-assign-to').value = ''; });
      document.getElementById('create-task-btn')?.addEventListener('click', () => {
        const title = document.getElementById('task-title').value;
        const assignTo = document.getElementById('task-assign-to').value;
        const priority = document.getElementById('task-priority').value;
        if (title && assignTo) {
          State.tasks.push({ id: String(Date.now()), taskTitle: title, taskAssignedTo: assignTo, taskPriority: priority, taskStatus: 'pending', progress: 0, progressNote: '', progressUpdatedAt: null, progressLog: [], createdAt: new Date().toISOString() });
          document.getElementById('task-assign-modal').style.display = 'none';
          this.showToast('✅ Task created successfully!', 'success');
          this.render();
        } else alert('Please select an employee');
      });

      // Feedback
      document.getElementById('view-feedback-btn')?.addEventListener('click', () => {
        const feedbackList = document.getElementById('feedback-list');
        feedbackList.innerHTML = State.feedback.map(f => `<div class="p-3 rounded bg-slate-900/50 border border-slate-700"><p class="text-sm mb-1">${f.feedbackAnonymous ? '🔒 Anonymous' : f.email}</p><p class="text-sm text-gray-300">${f.feedbackText}</p></div>`).join('') || '<p class="text-gray-400 text-sm">No feedback yet</p>';
        document.getElementById('feedback-modal').style.display = 'flex';
      });
      document.getElementById('close-feedback-modal')?.addEventListener('click', () => { document.getElementById('feedback-modal').style.display = 'none'; });
      document.getElementById('export-report-btn')?.addEventListener('click', () => this.exportReport());

      // HR Chat
      document.getElementById('hr-chat-btn')?.addEventListener('click', () => { document.getElementById('hr-chat-modal').style.display = 'flex'; document.getElementById('hr-chat-input').focus(); });
      document.getElementById('close-hr-chat-modal')?.addEventListener('click', () => { document.getElementById('hr-chat-modal').style.display = 'none'; });
      document.getElementById('hr-chat-send-btn')?.addEventListener('click', () => {
        const input = document.getElementById('hr-chat-input');
        const query = input.value.trim();
        if (query) {
          const chatHistory = document.getElementById('hr-chat-history');
          const response = ChatbotEngine.generateHRResponse(query, State.employees, State.tasks);
          chatHistory.innerHTML += `<div class="text-right animate-slide"><p class="text-sm bg-blue-900/30 p-2 rounded inline-block max-w-xs text-left">${query}</p></div><div class="animate-slide"><p class="text-sm bg-slate-900/50 p-3 rounded inline-block max-w-xs" style="text-align:left;">${response}</p></div>`;
          input.value = ''; chatHistory.scrollTop = chatHistory.scrollHeight;
        }
      });
      document.getElementById('hr-chat-input')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('hr-chat-send-btn').click(); });
      document.querySelectorAll('.hr-quick-query').forEach(btn => { btn.addEventListener('click', () => { document.getElementById('hr-chat-input').value = btn.dataset.query; document.getElementById('hr-chat-send-btn').click(); }); });

      // Employee Chat
      document.getElementById('chat-send-btn')?.addEventListener('click', () => {
        const input = document.getElementById('chat-input');
        const query = input.value.trim();
        if (query) {
          const chatHistory = document.getElementById('chat-history');
          const response = ChatbotEngine.generateResponse(query, State.employees, State.currentUser);
          chatHistory.innerHTML += `<div class="text-right"><p class="text-sm bg-blue-900/30 p-2 rounded inline-block max-w-xs text-left">${query}</p></div><div><p class="text-sm bg-slate-900/50 p-2 rounded inline-block max-w-xs">${response}</p></div>`;
          input.value = ''; chatHistory.scrollTop = chatHistory.scrollHeight;
        }
      });
      document.getElementById('chat-input')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('chat-send-btn').click(); });

      // Employee Feedback
      document.getElementById('submit-feedback-btn')?.addEventListener('click', () => {
        const text = document.getElementById('feedback-text').value;
        const anonymous = document.getElementById('feedback-anonymous').checked;
        if (text.trim()) { State.feedback.push({ id: String(State.feedback.length+1), feedbackText: text, feedbackAnonymous: anonymous, email: State.currentUser.email, createdAt: new Date().toISOString() }); document.getElementById('feedback-text').value = ''; alert('Thank you for your feedback!'); }
      });

      // Modal overlay close
      document.querySelectorAll('.modal-overlay').forEach(modal => { modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; }); });

      // Notification bell
      const notifBell = document.getElementById('notification-bell');
      const notifPanel = document.getElementById('notification-panel');
      if (notifBell && notifPanel) {
        notifBell.addEventListener('click', e => { e.stopPropagation(); notifPanel.classList.toggle('hidden'); });
        document.addEventListener('click', e => { if (!notifBell.contains(e.target) && !notifPanel.contains(e.target)) notifPanel.classList.add('hidden'); });
      }
    }

    static exportReport() {
      const leaderboard = GamificationEngine.calculateLeaderboardPosition(State.employees);
      let csv = 'Rank,Name,Department,Performance Score,Git Commits,Tasks,Meetings,Work Hours,Burnout Risk,Streak,Assigned Tasks,Avg Task Progress\n';
      leaderboard.forEach(emp => {
        const burnout = PerformanceAI.detectBurnout(emp);
        const empTasks = State.tasks.filter(t => t.taskAssignedTo === emp.email);
        const avgProgress = empTasks.length ? Math.round(empTasks.reduce((a,t)=>a+(t.progress||0),0)/empTasks.length) : 'N/A';
        csv += `${emp.rank},${emp.name},${emp.department},${emp.score},${emp.gitCommits},${emp.tasksCompleted},${emp.meetingsAttended},${emp.workHours},${burnout},${emp.streak},${empTasks.length},${avgProgress}%\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `intelliculture-report-${new Date().toISOString().split('T')[0]}.csv`; a.click();
    }

    static getHRNotifications() {
      const notifications = [];
      State.employees.forEach(emp => {
        const burnout = PerformanceAI.detectBurnout(emp);
        if (burnout === 'high') notifications.push({ type: 'burnout', icon: '🔥', title: `High Burnout Risk - ${emp.name}`, message: `${emp.name} shows signs of high burnout risk. Consider workload adjustment.`, time: 'Now', priority: 1 });
        else if (burnout === 'medium') notifications.push({ type: 'burnout', icon: '⏰', title: `Medium Burnout Risk - ${emp.name}`, message: `${emp.name} is showing moderate stress. Monitor closely.`, time: '5 min ago', priority: 2 });
      });
      // Progress update notifications
      const recentUpdates = State.notifications.filter(n => n.notificationType === 'progress' && !n.isRead);
      recentUpdates.forEach(n => notifications.push({ type: 'progress', icon: '📊', title: 'Task Progress Update', message: n.notificationMessage, time: timeAgo(n.createdAt), priority: 1 }));
      const urgentTasks = State.tasks.filter(t => t.taskStatus === 'pending' || t.taskStatus === 'in-progress');
      if (urgentTasks.length > 2) notifications.push({ type: 'deadline', icon: '⏰', title: `${urgentTasks.length} Active Tasks`, message: `${urgentTasks.length} tasks in progress. Check progress updates.`, time: '15 min ago', priority: 2 });
      const topPerformers = State.employees.filter(e => PerformanceAI.calculatePerformanceScore(e) > 85);
      if (topPerformers.length > 0) notifications.push({ type: 'achievement', icon: '⭐', title: `${topPerformers.length} Top Performers`, message: `${topPerformers.length} employees performing excellently!`, time: '30 min ago', priority: 3 });
      return notifications.sort((a, b) => a.priority - b.priority);
    }

    static getEmployeeNotifications(employee) {
      const notifications = [];
      const burnout = PerformanceAI.detectBurnout(employee);
      if (burnout === 'high') notifications.push({ type: 'burnout', icon: '🔥', title: 'High Burnout Risk', message: 'You\'re working too hard! Consider taking a break.', time: 'Now', priority: 1 });
      else if (burnout === 'medium') notifications.push({ type: 'burnout', icon: '⏰', title: 'Moderate Stress Detected', message: 'Your workload is increasing. Remember to take breaks.', time: '10 min ago', priority: 1 });
      const myTasks = State.tasks.filter(t => t.taskAssignedTo === employee.email);
      const staleTasks = myTasks.filter(t => t.progress < 100 && t.taskStatus !== 'completed' && (!t.progressUpdatedAt || Date.now() - new Date(t.progressUpdatedAt) > 1000*60*60*4));
      if (staleTasks.length > 0) notifications.push({ type: 'deadline', icon: '📋', title: `${staleTasks.length} Task${staleTasks.length>1?'s':''} Need Progress Update`, message: `HR is waiting for updates on ${staleTasks.length} task(s). Post your progress!`, time: '1 hour ago', priority: 1 });
      const score = PerformanceAI.calculatePerformanceScore(employee);
      if (score > 85) notifications.push({ type: 'achievement', icon: '🌟', title: 'Excellent Performance!', message: 'You\'re doing great! Keep up this momentum.', time: '45 min ago', priority: 3 });
      if (employee.streak >= 7 && employee.streak % 7 === 0) notifications.push({ type: 'achievement', icon: '🔥', title: `${employee.streak}-Day Streak!`, message: `Amazing! You've maintained a ${employee.streak}-day streak!`, time: '1 hour ago', priority: 3 });
      return notifications.sort((a, b) => a.priority - b.priority);
    }
  }

  // ── BOOT ─────────────────────────────────────
  UIManager.init();

  // Simulate real-time metric changes
  setInterval(() => {
    if (!State.currentUser) return;
    State.employees.forEach(emp => {
      if (Math.random() > 0.7) emp.gitCommits += Math.floor(Math.random() * 3);
      if (Math.random() > 0.9) emp.tasksCompleted += Math.floor(Math.random() * 2);
      if (emp.gitCommits > 0 && emp.tasksCompleted > 0) emp.streak = Math.min(emp.streak + 1, 30);
      emp.lastActive = new Date().toISOString();
    });
  }, 30000);
  </script>
 </body>
