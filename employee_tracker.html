<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliCulture - Employee Activity Tracker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body, #app {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }

    /* Animations */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    }

    .animate-slide { animation: slideIn 0.5s ease-out; }
    .animate-fade { animation: fadeIn 0.3s ease-in; }
    .glow-pulse { animation: pulse-glow 2s infinite; }

    /* Cards */
    .glass-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
    }

    .glass-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.95);
      transition: all 0.3s ease;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(51, 65, 85, 0.8);
      color: #e2e8f0;
      padding: 10px 20px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(71, 85, 105, 0.8);
      border-color: rgba(148, 163, 184, 0.4);
    }

    /* Forms */
    input, textarea, select {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.95);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }

    .badge-success {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.3);
    }

    .badge-warning {
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
      border-color: rgba(251, 146, 60, 0.3);
    }

    .badge-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.3);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.6);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      animation: slideIn 0.3s ease-out;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Chart styles */
    .chart-container {
      position: relative;
      height: 300px;
      margin: 20px 0;
    }

    .stat-box {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #60a5fa;
      margin: 10px 0;
    }

    .stat-box .label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body>
  <div id="app" class="h-full w-full overflow-hidden"></div>
  <script>
    // ============================================
    // DATA MODELS & AI ENGINE
    // ============================================

    class PerformanceAI {
      static calculatePerformanceScore(employee) {
        const weights = {
          gitCommits: 0.25,
          tasksCompleted: 0.25,
          meetingsAttended: 0.15,
          jiraTickets: 0.15,
          workHours: 0.20
        };

        const maxMetrics = {
          gitCommits: 100,
          tasksCompleted: 50,
          meetingsAttended: 30,
          jiraTickets: 50,
          workHours: 160
        };

        let score = 0;
        for (const [metric, weight] of Object.entries(weights)) {
          const normalized = Math.min(employee[metric] || 0, maxMetrics[metric]) / maxMetrics[metric];
          score += normalized * weight * 100;
        }

        return Math.round(score);
      }

      static detectBurnout(employee) {
        const workHours = employee.workHours || 0;
        const consistency = employee.streak || 0;
        const lastActive = new Date(employee.lastActive || new Date());
        const daysSinceActive = Math.floor((Date.now() - lastActive) / (1000 * 60 * 60 * 24));

        let burnoutScore = 0;

        if (workHours > 50) burnoutScore += 30; // Excessive work
        if (workHours < 20) burnoutScore += 20; // Inconsistent work
        if (consistency < 5) burnoutScore += 20; // Low streak
        if (daysSinceActive > 3) burnoutScore += 30; // Inactive

        if (burnoutScore >= 60) return 'high';
        if (burnoutScore >= 40) return 'medium';
        return 'low';
      }

      static generateTrendAnalysis(employee) {
        const trend = {
          trajectory: 'stable',
          prediction: 'likely_to_maintain',
          insights: []
        };

        const score = this.calculatePerformanceScore(employee);

        if (employee.streak > 7) {
          trend.trajectory = 'upward';
          trend.prediction = 'likely_to_improve';
          trend.insights.push('🚀 Strong momentum with current streak');
        } else if (employee.streak > 3) {
          trend.trajectory = 'stable';
          trend.prediction = 'likely_to_maintain';
          trend.insights.push('✅ Steady performance');
        } else {
          trend.trajectory = 'downward';
          trend.prediction = 'needs_attention';
          trend.insights.push('⚠️ Recent activity drop detected');
        }

        if (score > 80) trend.insights.push('⭐ Top performer');
        if (employee.workHours > 50) trend.insights.push('⏰ Consider workload balance');

        return trend;
      }

      static suggestTasks(employee, availableTasks) {
        const score = this.calculatePerformanceScore(employee);
        
        return availableTasks
          .filter(task => {
            if (score > 80 && task.priority === 'high') return true;
            if (score > 60 && task.priority !== 'critical') return true;
            return task.priority !== 'high';
          })
          .sort((a, b) => {
            const priorityMap = { critical: 3, high: 2, medium: 1, low: 0 };
            return priorityMap[b.priority] - priorityMap[a.priority];
          })
          .slice(0, 3);
      }

      static findBestEmployee(taskTitle, taskPriority, employees) {
        // Analyze task requirements based on keywords
        const taskLower = taskTitle.toLowerCase();
        const skillMap = {
          'frontend': { skill: 'frontend', weight: 1 },
          'backend': { skill: 'backend', weight: 1 },
          'design': { skill: 'design', weight: 1 },
          'api': { skill: 'backend', weight: 0.8 },
          'database': { skill: 'backend', weight: 0.9 },
          'authentication': { skill: 'backend', weight: 0.85 },
          'ui': { skill: 'frontend', weight: 0.9 },
          'bug': { skill: 'general', weight: 0.7 },
          'feature': { skill: 'general', weight: 0.8 },
          'test': { skill: 'general', weight: 0.6 },
          'documentation': { skill: 'general', weight: 0.5 },
          'review': { skill: 'general', weight: 0.7 }
        };

        // Score each employee
        const scoredEmployees = employees
          .filter(emp => {
            // Filter out employees who are already overloaded
            const assignedTasks = State.tasks.filter(t => t.taskAssignedTo === emp.email).length;
            return assignedTasks < 5; // Max 5 tasks per employee
          })
          .map(emp => {
            let score = 0;
            const perfScore = this.calculatePerformanceScore(emp);
            const burnout = this.detectBurnout(emp);

            // Base score from performance
            score += perfScore * 0.4;

            // Burnout penalty
            if (burnout === 'high') score -= 30;
            if (burnout === 'medium') score -= 10;

            // Task priority matching
            if (taskPriority === 'critical') {
              score += perfScore > 75 ? 20 : perfScore > 60 ? 10 : 0;
            } else if (taskPriority === 'high') {
              score += perfScore > 70 ? 15 : perfScore > 50 ? 5 : 0;
            }

            // Skill detection from task title
            for (const [keyword, skillData] of Object.entries(skillMap)) {
              if (taskLower.includes(keyword)) {
                // Check if employee has relevant metrics
                if (skillData.skill === 'frontend' && emp.gitCommits > 20) {
                  score += 15 * skillData.weight;
                } else if (skillData.skill === 'backend' && emp.jiraTickets > 15) {
                  score += 15 * skillData.weight;
                } else if (skillData.skill === 'design' && emp.meetingsAttended > 15) {
                  score += 10 * skillData.weight;
                } else if (skillData.skill === 'general') {
                  score += 5 * skillData.weight;
                }
              }
            }

            // Streak bonus (shows consistency)
            score += emp.streak * 1.5;

            // Current workload (fewer tasks = higher priority)
            const currentTasks = State.tasks.filter(t => t.taskAssignedTo === emp.email).length;
            score += (5 - currentTasks) * 2;

            return {
              employee: emp,
              score: Math.max(0, score),
              reason: this.generateMatchReason(emp, taskTitle, perfScore, burnout)
            };
          })
          .sort((a, b) => b.score - a.score);

        return scoredEmployees[0] || null;
      }

      static generateMatchReason(employee, taskTitle, perfScore, burnout) {
        const reasons = [];

        if (perfScore > 80) {
          reasons.push('Top performer');
        } else if (perfScore > 60) {
          reasons.push('Strong performer');
        }

        if (employee.streak > 5) {
          reasons.push(`${employee.streak}-day streak`);
        }

        const currentTasks = State.tasks.filter(t => t.taskAssignedTo === employee.email).length;
        if (currentTasks < 2) {
          reasons.push('Light workload');
        }

        if (burnout === 'low') {
          reasons.push('Good health');
        }

        if (employee.gitCommits > 30) {
          reasons.push('Strong coder');
        }

        return reasons.slice(0, 3).join(' • ');
      }

      static generateInsights(employee) {
        const insights = [];
        const score = this.calculatePerformanceScore(employee);
        const burnout = this.detectBurnout(employee);

        if (score > 85) {
          insights.push({
            type: 'positive',
            text: '🌟 Exceptional contributor! Keep maintaining this pace.',
            emoji: '⭐'
          });
        }

        if (burnout === 'high') {
          insights.push({
            type: 'warning',
            text: '🔥 Burnout risk detected. Consider workload adjustment.',
            emoji: '⚠️'
          });
        }

        if (employee.gitCommits < 5) {
          insights.push({
            type: 'suggestion',
            text: '💡 Increase code contributions for better visibility.',
            emoji: '💭'
          });
        }

        if (employee.meetingsAttended > 15) {
          insights.push({
            type: 'suggestion',
            text: '📅 Consider reducing meetings to focus on deliverables.',
            emoji: '💭'
          });
        }

        return insights;
      }
    }

    // ============================================
    // GAMIFICATION ENGINE
    // ============================================

    class GamificationEngine {
      static awardBadges(employee) {
        const badges = [];
        const score = PerformanceAI.calculatePerformanceScore(employee);

        if (score > 90) badges.push({ name: 'superstar', icon: '⭐', label: 'Superstar' });
        if (employee.streak > 14) badges.push({ name: 'flame', icon: '🔥', label: '14-Day Streak' });
        if (employee.gitCommits > 50) badges.push({ name: 'coder', icon: '💻', label: 'Code Master' });
        if (employee.tasksCompleted > 30) badges.push({ name: 'taskforce', icon: '✅', label: 'Task Force' });
        if (employee.meetingsAttended > 20) badges.push({ name: 'connector', icon: '🤝', label: 'Team Connector' });

        return badges;
      }

      static calculateLeaderboardPosition(employees) {
        return employees
          .map(emp => ({
            ...emp,
            score: PerformanceAI.calculatePerformanceScore(emp)
          }))
          .sort((a, b) => b.score - a.score)
          .map((emp, idx) => ({
            ...emp,
            rank: idx + 1,
            medal: idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : ''
          }));
      }
    }

    // ============================================
    // CHATBOT ENGINE
    // ============================================

    class ChatbotEngine {
      static generateResponse(query, employees, currentUser) {
        const lowerQuery = query.toLowerCase();

        if (lowerQuery.includes('performance') || lowerQuery.includes('how am i')) {
          const user = employees.find(e => e.email === currentUser.email);
          const score = PerformanceAI.calculatePerformanceScore(user);
          return `📊 Your performance score: ${score}/100. You've completed ${user.tasksCompleted} tasks with ${user.gitCommits} commits. ${score > 80 ? '🌟 Excellent work!' : 'Keep pushing! 💪'}`;
        }

        if (lowerQuery.includes('top performer') || lowerQuery.includes('best')) {
          const leaderboard = GamificationEngine.calculateLeaderboardPosition(employees);
          const topEmp = leaderboard[0];
          return `🏆 ${topEmp.name} is leading with ${topEmp.score} points! Great performance this month.`;
        }

        if (lowerQuery.includes('burnout') || lowerQuery.includes('stress')) {
          const user = employees.find(e => e.email === currentUser.email);
          const burnout = PerformanceAI.detectBurnout(user);
          return `${burnout === 'high' ? '🔥 High burnout risk detected. Take a break!' : '✅ You\'re doing fine. Keep the balance! 😊'}`;
        }

        if (lowerQuery.includes('goal') || lowerQuery.includes('target')) {
          return '🎯 Set a goal of 85+ performance score this month. Focus on consistent commits and task completion!';
        }

        return '🤖 I can help! Try asking about your performance, top performers, burnout risk, or goals.';
      }

      static generateHRResponse(query, employees, tasks = []) {
        const lowerQuery = query.toLowerCase();

        // === EMPLOYEE REMOVAL RECOMMENDATIONS ===
        if (lowerQuery.includes('remove') || lowerQuery.includes('fire') || lowerQuery.includes('redundant') || lowerQuery.includes('underperforming')) {
          const underperforming = employees.filter(e => {
            const score = PerformanceAI.calculatePerformanceScore(e);
            return score < 40;
          });

          if (underperforming.length === 0) {
            return `✅ <strong>Good News!</strong><br>No severely underperforming employees detected. All employees are contributing to the team.`;
          }

          let analysis = `⚠️ <strong>Low Performance Employees (${underperforming.length}):</strong><br>`;
          analysis += underperforming.map(e => {
            const score = PerformanceAI.calculatePerformanceScore(e);
            const burnout = PerformanceAI.detectBurnout(e);
            return `• <strong>${e.name}</strong><br>&nbsp;&nbsp;Score: ${score}/100 | Tasks: ${e.tasksCompleted} | Commits: ${e.gitCommits}<br>&nbsp;&nbsp;Recommendation: Consider training, reassignment, or performance plan before removal`;
          }).join('<br>');

          analysis += `<br><br>💡 <strong>Suggestion:</strong> Before removing anyone, consider:<br>• Performance improvement plan (30-60 days)<br>• Role reassignment to better-suited position<br>• Training or mentoring program<br>• Check if workload is unrealistic`;

          return analysis;
        }

        // === EMPLOYEE ADDITION RECOMMENDATIONS ===
        if (lowerQuery.includes('add') || lowerQuery.includes('hire') || lowerQuery.includes('need') || lowerQuery.includes('shortage')) {
          const depts = {};
          employees.forEach(e => {
            if (!depts[e.department]) depts[e.department] = { count: 0, totalWorkHours: 0, avgScore: 0, tasks: 0 };
            depts[e.department].count++;
            depts[e.department].totalWorkHours += e.workHours;
            depts[e.department].avgScore += PerformanceAI.calculatePerformanceScore(e);
            depts[e.department].tasks += tasks.filter(t => t.taskAssignedTo === e.email).length;
          });

          // Calculate metrics
          const analysis = Object.entries(depts).map(([dept, data]) => {
            data.avgScore = Math.round(data.avgScore / data.count);
            const avgHoursPerEmp = Math.round(data.totalWorkHours / data.count);
            const needsMoreStaff = avgHoursPerEmp > 45 || data.tasks > data.count * 5;

            return {
              dept,
              count: data.count,
              avgHours: avgHoursPerEmp,
              avgScore: data.avgScore,
              tasks: data.tasks,
              needsStaff: needsMoreStaff
            };
          });

          const understaffed = analysis.filter(d => d.needsStaff);

          if (understaffed.length === 0) {
            return `✅ <strong>Team Capacity Check:</strong><br>Your team has balanced workload distribution. No immediate hiring needed.`;
          }

          let recommendation = `🔴 <strong>Departments Needing Additional Staff:</strong><br>`;
          recommendation += understaffed.map(d => {
            const role = d.dept === 'Engineering' ? 'Backend/Frontend Developer' : d.dept === 'Product' ? 'Product Manager' : 'General Role';
            return `• <strong>${d.dept}</strong> - Add 1-2 people<br>&nbsp;&nbsp;Current: ${d.count} employees | Avg hours: ${d.avgHours}h | Avg performance: ${d.avgScore}/100<br>&nbsp;&nbsp;Recommended role: ${role}`;
          }).join('<br>');

          recommendation += `<br><br>📊 <strong>Hiring Priority:</strong><br>1. Focus on departments with high workload (${understaffed.map(d => d.avgHours).sort((a,b) => b-a)[0]}+ hours)<br>2. Look for experienced hires to boost average performance<br>3. Consider contractors for short-term project needs`;

          return recommendation;
        }

        // === TEAM COMPOSITION ANALYSIS ===
        if (lowerQuery.includes('team composition') || lowerQuery.includes('ideal team') || lowerQuery.includes('team structure')) {
          const depts = {};
          employees.forEach(e => {
            if (!depts[e.department]) depts[e.department] = [];
            depts[e.department].push(e);
          });

          let analysis = `🏢 <strong>Current Team Composition:</strong><br>`;
          analysis += Object.entries(depts).map(([dept, emps]) => {
            const avgScore = Math.round(emps.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / emps.length);
            const topPerformers = emps.filter(e => PerformanceAI.calculatePerformanceScore(e) > 80).length;
            return `• ${dept}: ${emps.length} people (Top performers: ${topPerformers}, Avg score: ${avgScore}/100)`;
          }).join('<br>');

          analysis += `<br><br>💡 <strong>Ideal Team Composition:</strong><br>`;
          analysis += `For ${employees.length} total employees:<br>`;
          analysis += `• 20% Senior/Lead roles (mentors, architects)<br>`;
          analysis += `• 50% Mid-level roles (core contributors)<br>`;
          analysis += `• 30% Junior roles (growing talent)<br><br>`;
          analysis += `🎯 <strong>Action Items:</strong><br>`;
          analysis += `• Identify 2-3 potential leaders for mentoring<br>`;
          analysis += `• Create clear career progression paths<br>`;
          analysis += `• Balance workload across skill levels`;

          return analysis;
        }

        // === WORKLOAD DISTRIBUTION ===
        if (lowerQuery.includes('workload') || lowerQuery.includes('balance') || lowerQuery.includes('overload')) {
          const workloadAnalysis = employees.map(e => ({
            name: e.name,
            hours: e.workHours,
            tasks: tasks.filter(t => t.taskAssignedTo === e.email).length,
            score: PerformanceAI.calculatePerformanceScore(e)
          })).sort((a, b) => b.hours - a.hours);

          const overloaded = workloadAnalysis.filter(e => e.hours > 50);
          const underutilized = workloadAnalysis.filter(e => e.hours < 30);

          let analysis = `⚙️ <strong>Workload Distribution Analysis:</strong><br>`;
          
          if (overloaded.length > 0) {
            analysis += `🔴 <strong>Overloaded (${overloaded.length}):</strong><br>`;
            analysis += overloaded.map(e => `• ${e.name}: ${e.hours}h/week, ${e.tasks} tasks (Score: ${e.score}/100)`).join('<br>');
            analysis += `<br>`;
          }

          if (underutilized.length > 0) {
            analysis += `🟢 <strong>Underutilized (${underutilized.length}):</strong><br>`;
            analysis += underutilized.map(e => `• ${e.name}: ${e.hours}h/week, ${e.tasks} tasks (Score: ${e.score}/100)`).join('<br>');
            analysis += `<br>`;
          }

          analysis += `📋 <strong>Rebalancing Recommendations:</strong><br>`;
          if (overloaded.length > 0 && underutilized.length > 0) {
            analysis += `• Redistribute ${Math.ceil((overloaded.reduce((a,e) => a+e.hours, 0) - overloaded.length * 40) / underutilized.length)}h from overloaded to underutilized<br>`;
          }
          analysis += `• Target workload: 40-45 hours/week per employee<br>`;
          analysis += `• Review task priority and urgency<br>`;
          analysis += `• Consider hiring if redistribution isn't possible`;

          return analysis;
        }

        // === TOP PERFORMERS ===
        if (lowerQuery.includes('top') && (lowerQuery.includes('performer') || lowerQuery.includes('employee'))) {
          const leaderboard = GamificationEngine.calculateLeaderboardPosition(employees);
          const top3 = leaderboard.slice(0, 3);
          return `🏆 <strong>Top 3 Performers:</strong><br>${top3.map((emp, i) => `${i+1}. ${emp.name} - ${emp.score} points (${emp.department})`).join('<br>')}`;
        }

        // === BURNOUT RISK ===
        if (lowerQuery.includes('burnout') || lowerQuery.includes('risk')) {
          const atRisk = employees.filter(e => PerformanceAI.detectBurnout(e) === 'high');
          if (atRisk.length === 0) return '✅ Good news! No employees with high burnout risk detected.';
          
          let analysis = `🔥 <strong>High Burnout Risk (${atRisk.length}):</strong><br>`;
          analysis += atRisk.map(e => {
            const score = PerformanceAI.calculatePerformanceScore(e);
            return `• ${e.name} - ${e.workHours}h/week, Score: ${score}/100, Streak: ${e.streak} days<br>&nbsp;&nbsp;Action: Reduce workload immediately, offer support`;
          }).join('<br>');
          
          return analysis;
        }

        // === TEAM PERFORMANCE TRENDS ===
        if (lowerQuery.includes('trend') || lowerQuery.includes('performance') || lowerQuery.includes('progress')) {
          const avgScore = Math.round(employees.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / employees.length);
          const improving = employees.filter(e => e.streak > 7).length;
          const declining = employees.filter(e => e.streak < 3).length;
          const stable = employees.filter(e => e.streak >= 3 && e.streak <= 7).length;
          
          let analysis = `📈 <strong>Team Performance Trends:</strong><br>`;
          analysis += `Average Score: ${avgScore}/100<br>`;
          analysis += `🚀 Improving (7+ day streak): ${improving} employees<br>`;
          analysis += `➡️ Stable (3-7 day streak): ${stable} employees<br>`;
          analysis += `⚠️ Declining (<3 day streak): ${declining} employees<br><br>`;
          
          analysis += `💡 <strong>Overall Assessment:</strong><br>`;
          const improvementRate = Math.round((improving / employees.length) * 100);
          if (improvementRate > 60) {
            analysis += `✅ Strong positive momentum! Team is performing well.`;
          } else if (improvementRate > 40) {
            analysis += `⚠️ Mixed performance. Need to support declining employees.`;
          } else {
            analysis += `🔴 Team is struggling. Review workload, provide support, and identify bottlenecks.`;
          }
          
          return analysis;
        }

        // === AVERAGE METRICS ===
        if (lowerQuery.includes('average') || lowerQuery.includes('avg')) {
          const avgCommits = Math.round(employees.reduce((a, e) => a + e.gitCommits, 0) / employees.length);
          const avgTasks = Math.round(employees.reduce((a, e) => a + e.tasksCompleted, 0) / employees.length);
          const avgHours = Math.round(employees.reduce((a, e) => a + e.workHours, 0) / employees.length);
          const avgScore = Math.round(employees.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / employees.length);
          
          return `📊 <strong>Team Averages:</strong><br>Commits: ${avgCommits}<br>Tasks: ${avgTasks}<br>Work Hours: ${avgHours}h<br>Performance Score: ${avgScore}/100`;
        }

        // === DEPARTMENT BREAKDOWN ===
        if (lowerQuery.includes('department') || lowerQuery.includes('team')) {
          const depts = {};
          employees.forEach(e => {
            if (!depts[e.department]) depts[e.department] = [];
            depts[e.department].push(e);
          });
          const summary = Object.entries(depts).map(([dept, emps]) => {
            const avgScore = Math.round(emps.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / emps.length);
            return `${dept}: ${emps.length} employees (Avg Score: ${avgScore})`;
          }).join('<br>');
          return `🏢 <strong>Department Breakdown:</strong><br>${summary}`;
        }

        // === SPECIFIC EMPLOYEE QUERY ===
        const nameQuery = query.match(/(?:about|for|is|on)\s+(\w+)/i)?.[1]?.toLowerCase();
        if (nameQuery) {
          const emp = employees.find(e => e.name.toLowerCase().includes(nameQuery));
          if (emp) {
            const score = PerformanceAI.calculatePerformanceScore(emp);
            const burnout = PerformanceAI.detectBurnout(emp);
            const insights = PerformanceAI.generateInsights(emp);
            const empTasks = tasks.filter(t => t.taskAssignedTo === emp.email).length;
            
            return `👤 <strong>${emp.name}</strong><br>Score: ${score}/100<br>Department: ${emp.department}<br>Commits: ${emp.gitCommits} | Tasks: ${emp.tasksCompleted} | Assigned: ${empTasks}<br>Work Hours: ${emp.workHours}h | Burnout: ${burnout}<br>Streak: ${emp.streak} days<br><strong>Insights:</strong> ${insights.map(i => i.text).join(' | ')}`;
          }
        }

        // === BEST DEPARTMENT ===
        if (lowerQuery.includes('best department') || lowerQuery.includes('top department')) {
          const depts = {};
          employees.forEach(e => {
            if (!depts[e.department]) depts[e.department] = [];
            depts[e.department].push(e);
          });
          const deptScores = Object.entries(depts).map(([dept, emps]) => ({
            dept,
            score: Math.round(emps.reduce((a, e) => a + PerformanceAI.calculatePerformanceScore(e), 0) / emps.length)
          })).sort((a, b) => b.score - a.score);
          return `🥇 <strong>Best Performing Department:</strong> ${deptScores[0].dept} with ${deptScores[0].score}/100 average score`;
        }

        // === ACTIVITY STATUS ===
        if (lowerQuery.includes('active') || lowerQuery.includes('inactive')) {
          const active = employees.filter(e => {
            const daysSince = Math.floor((Date.now() - new Date(e.lastActive)) / (1000 * 60 * 60 * 24));
            return daysSince < 3;
          });
          return `👥 <strong>Activity Status:</strong><br>Active (last 3 days): ${active.length}<br>Inactive: ${employees.length - active.length}`;
        }

        return '💡 <strong>I can help with:</strong><br>• Employee removal/performance analysis<br>• Hiring recommendations & team gaps<br>• Team composition & structure<br>• Workload distribution & balance<br>• Burnout risk & performance trends<br>• Department analysis<br>• Specific employee details';
      }
    }

      static attachEventListeners() {
        // Auth page
        document.getElementById('login-btn')?.addEventListener('click', (e) => {
          e.preventDefault();
          const email = document.getElementById('login-email')?.value || '';
          const password = document.getElementById('login-password')?.value || '';

          console.log('Login attempt:', email, password);

          if (!email || !password) {
            alert('Please enter email and password');
            return;
          }

          if (State.login(email, password)) {
            this.render();
          } else {
            alert('Invalid credentials. Try hr@intelliculture.com / hr123');
          }
        });

        document.getElementById('signup-toggle')?.addEventListener('click', () => {
          State.currentView = 'signup';
          this.render();
        });

        // Signup
        document.getElementById('signup-role')?.addEventListener('change', (e) => {
          const dept = document.getElementById('department-field');
          if (e.target.value === 'employee') {
            dept.style.display = 'block';
          } else {
            dept.style.display = 'none';
          }
        });

        document.getElementById('signup-btn')?.addEventListener('click', () => {
          const name = document.getElementById('signup-name').value;
          const email = document.getElementById('signup-email').value;
          const password = document.getElementById('signup-password').value;
          const role = document.getElementById('signup-role').value;
          const department = document.getElementById('signup-department')?.value || 'General';

          if (name && email && password && role) {
            if (State.signup(email, password, name, role, department)) {
              alert('Account created! Please login.');
              State.currentView = 'auth';
              this.render();
            } else {
              alert('Email already exists');
            }
          } else {
            alert('Please fill all fields');
          }
        });

        document.getElementById('back-to-login')?.addEventListener('click', () => {
          State.currentView = 'auth';
          this.render();
        });

        // Logout
        document.getElementById('logout-btn')?.addEventListener('click', () => {
          State.currentUser = null;
          State.currentView = 'auth';
          this.render();
        });

        // HR Dashboard - Employee detail
        document.querySelectorAll('.employee-row').forEach(row => {
          row.addEventListener('click', () => {
            this.showEmployeeDetail(row.dataset.email);
          });
        });

        // HR Dashboard - Task assignment
        document.getElementById('assign-task-btn')?.addEventListener('click', () => {
          document.getElementById('task-assign-modal').style.display = 'flex';
          document.getElementById('ai-suggestion').classList.add('hidden');
          document.getElementById('task-title').value = '';
          document.getElementById('task-priority').value = 'medium';
          document.getElementById('task-assign-to').value = '';
        });

        document.getElementById('close-task-modal')?.addEventListener('click', () => {
          document.getElementById('task-assign-modal').style.display = 'none';
        });

        document.getElementById('auto-assign-btn')?.addEventListener('click', () => {
          const taskTitle = document.getElementById('task-title').value;
          const taskPriority = document.getElementById('task-priority').value;

          if (!taskTitle.trim()) {
            alert('Please enter a task title first');
            return;
          }

          // Get AI suggestion
          const suggestion = PerformanceAI.findBestEmployee(taskTitle, taskPriority, State.employees);

          if (suggestion) {
            // Show suggestion
            document.getElementById('suggested-employee').textContent = suggestion.employee.name;
            document.getElementById('suggested-reason').textContent = suggestion.reason;
            document.getElementById('ai-suggestion').classList.remove('hidden');
            document.getElementById('task-assign-to').value = suggestion.employee.email;

            // Store current suggestion
            window.currentSuggestion = suggestion.employee.email;
          } else {
            alert('No suitable employee found. All employees are at maximum capacity or have high burnout risk.');
          }
        });

        document.getElementById('accept-suggestion-btn')?.addEventListener('click', () => {
          document.getElementById('task-assign-to').value = window.currentSuggestion;
          // Trigger create task immediately after accepting
          document.getElementById('create-task-btn').click();
        });

        document.getElementById('reject-suggestion-btn')?.addEventListener('click', () => {
          document.getElementById('ai-suggestion').classList.add('hidden');
          document.getElementById('task-assign-to').value = '';
          window.currentSuggestion = null;
        });

        document.getElementById('create-task-btn')?.addEventListener('click', () => {
          const title = document.getElementById('task-title').value;
          const assignTo = document.getElementById('task-assign-to').value;
          const priority = document.getElementById('task-priority').value;

          if (title && assignTo) {
            State.tasks.push({
              id: String(State.tasks.length + 1),
              taskTitle: title,
              taskAssignedTo: assignTo,
              taskPriority: priority,
              taskStatus: 'pending',
              createdAt: new Date().toISOString()
            });

            State.notifications.push({
              id: String(State.notifications.length + 1),
              notificationMessage: `New task assigned: ${title}`,
              notificationType: 'task',
              isRead: false,
              createdAt: new Date().toISOString()
            });

            document.getElementById('task-assign-modal').style.display = 'none';
            this.render();
          } else {
            alert('Please select an employee');
          }
        });

        // HR Dashboard - Feedback view
        document.getElementById('view-feedback-btn')?.addEventListener('click', () => {
          const feedbackList = document.getElementById('feedback-list');
          feedbackList.innerHTML = State.feedback.map(f => `
            <div class="p-3 rounded bg-slate-900/50 border border-slate-700">
              <p class="text-sm mb-1">${f.feedbackAnonymous ? '🔒 Anonymous' : f.email}</p>
              <p class="text-sm text-gray-300">${f.feedbackText}</p>
            </div>
          `).join('') || '<p class="text-gray-400 text-sm">No feedback yet</p>';

          document.getElementById('feedback-modal').style.display = 'flex';
        });

        document.getElementById('close-feedback-modal')?.addEventListener('click', () => {
          document.getElementById('feedback-modal').style.display = 'none';
        });

        // HR Dashboard - Export report
        document.getElementById('export-report-btn')?.addEventListener('click', () => {
          this.exportReport();
        });

        // HR Dashboard - Chat
        document.getElementById('hr-chat-btn')?.addEventListener('click', () => {
          document.getElementById('hr-chat-modal').style.display = 'flex';
          document.getElementById('hr-chat-input').focus();
        });

        document.getElementById('close-hr-chat-modal')?.addEventListener('click', () => {
          document.getElementById('hr-chat-modal').style.display = 'none';
        });

        document.getElementById('hr-chat-send-btn')?.addEventListener('click', () => {
          const input = document.getElementById('hr-chat-input');
          const query = input.value;

          if (query.trim()) {
            const chatHistory = document.getElementById('hr-chat-history');
            const response = ChatbotEngine.generateHRResponse(query, State.employees, State.tasks);

            chatHistory.innerHTML += `
              <div class="text-right animate-slide">
                <p class="text-sm bg-blue-900/30 p-2 rounded inline-block max-w-xs text-left">${query}</p>
              </div>
              <div class="animate-slide">
                <p class="text-sm bg-slate-900/50 p-3 rounded inline-block max-w-xs" style="text-align: left;">${response}</p>
              </div>
            `;

            input.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
        });

        document.getElementById('hr-chat-input')?.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            document.getElementById('hr-chat-send-btn').click();
          }
        });

        document.querySelectorAll('.hr-quick-query').forEach(btn => {
          btn.addEventListener('click', () => {
            const query = btn.dataset.query;
            document.getElementById('hr-chat-input').value = query;
            document.getElementById('hr-chat-send-btn').click();
          });
        });

        // Employee Dashboard - Chat
        document.getElementById('chat-send-btn')?.addEventListener('click', () => {
          const input = document.getElementById('chat-input');
          const query = input.value;

          if (query.trim()) {
            const chatHistory = document.getElementById('chat-history');
            const response = ChatbotEngine.generateResponse(query, State.employees, State.currentUser);

            chatHistory.innerHTML += `
              <div class="text-right">
                <p class="text-sm bg-blue-900/30 p-2 rounded inline-block max-w-xs text-left">${query}</p>
              </div>
              <div>
                <p class="text-sm bg-slate-900/50 p-2 rounded inline-block max-w-xs">${response}</p>
              </div>
            `;

            input.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
        });

        // Employee Dashboard - Feedback
        document.getElementById('submit-feedback-btn')?.addEventListener('click', () => {
          const text = document.getElementById('feedback-text').value;
          const anonymous = document.getElementById('feedback-anonymous').checked;

          if (text.trim()) {
            State.feedback.push({
              id: String(State.feedback.length + 1),
              feedbackText: text,
              feedbackAnonymous: anonymous,
              email: State.currentUser.email,
              createdAt: new Date().toISOString()
            });

            document.getElementById('feedback-text').value = '';
            alert('Thank you for your feedback!');
          }
        });

        // Modal close on overlay click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
          modal.addEventListener('click', (e) => {
            if (e.target === modal) {
              modal.style.display = 'none';
            }
          });
        });

        // Notification bell toggle
        const notifBell = document.getElementById('notification-bell');
        const notifPanel = document.getElementById('notification-panel');

        if (notifBell && notifPanel) {
          notifBell.addEventListener('click', (e) => {
            e.stopPropagation();
            notifPanel.classList.toggle('hidden');
          });

          document.addEventListener('click', (e) => {
            if (!notifBell.contains(e.target) && !notifPanel.contains(e.target)) {
              notifPanel.classList.add('hidden');
            }
          });
        }
      }

      static exportReport() {
        const leaderboard = GamificationEngine.calculateLeaderboardPosition(State.employees);
        let csv = 'Rank,Name,Department,Performance Score,Git Commits,Tasks,Meetings,Work Hours,Burnout Risk,Streak\n';

        leaderboard.forEach(emp => {
          const burnout = PerformanceAI.detectBurnout(emp);
          csv += `${emp.rank},${emp.name},${emp.department},${emp.score},${emp.gitCommits},${emp.tasksCompleted},${emp.meetingsAttended},${emp.workHours},${burnout},${emp.streak}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `intelliculture-report-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      }

      static getHRNotifications() {
        const notifications = [];
        const now = new Date();

        // Burnout risk notifications
        State.employees.forEach(emp => {
          const burnout = PerformanceAI.detectBurnout(emp);
          if (burnout === 'high') {
            notifications.push({
              type: 'burnout',
              icon: '🔥',
              title: `High Burnout Risk - ${emp.name}`,
              message: `${emp.name} shows signs of high burnout risk. Consider workload adjustment.`,
              time: 'Now',
              priority: 1
            });
          } else if (burnout === 'medium') {
            notifications.push({
              type: 'burnout',
              icon: '⏰',
              title: `Medium Burnout Risk - ${emp.name}`,
              message: `${emp.name} is showing moderate stress. Monitor closely.`,
              time: '5 min ago',
              priority: 2
            });
          }
        });

        // Deadline notifications
        const urgentTasks = State.tasks.filter(t => t.taskStatus === 'pending' || t.taskStatus === 'in-progress');
        if (urgentTasks.length > 2) {
          notifications.push({
            type: 'deadline',
            icon: '⏰',
            title: `${urgentTasks.length} Pending Tasks`,
            message: `There are ${urgentTasks.length} tasks pending. Review assignments.`,
            time: '15 min ago',
            priority: 2
          });
        }

        // Performance milestone
        const topPerformers = State.employees.filter(e => PerformanceAI.calculatePerformanceScore(e) > 85);
        if (topPerformers.length > 0) {
          notifications.push({
            type: 'achievement',
            icon: '⭐',
            title: `${topPerformers.length} Top Performers`,
            message: `You have ${topPerformers.length} employees performing excellently this month!`,
            time: '30 min ago',
            priority: 3
          });
        }

        return notifications.sort((a, b) => a.priority - b.priority);
      }

      static getEmployeeNotifications(employee) {
        const notifications = [];

        // Burnout warning
        const burnout = PerformanceAI.detectBurnout(employee);
        if (burnout === 'high') {
          notifications.push({
            type: 'burnout',
            icon: '🔥',
            title: 'High Burnout Risk',
            message: 'You\'re working too hard! Consider taking a break. Your well-being matters.',
            time: 'Now',
            priority: 1
          });
        } else if (burnout === 'medium') {
          notifications.push({
            type: 'burnout',
            icon: '⏰',
            title: 'Moderate Stress Detected',
            message: 'Your workload is increasing. Remember to take breaks.',
            time: '10 min ago',
            priority: 1
          });
        }

        // Task deadline reminders
        const assignedTasks = State.tasks.filter(t => t.taskAssignedTo === employee.email);
        const pendingTasks = assignedTasks.filter(t => t.taskStatus === 'pending');
        
        if (pendingTasks.length > 0) {
          notifications.push({
            type: 'deadline',
            icon: '📋',
            title: `${pendingTasks.length} Pending Task${pendingTasks.length > 1 ? 's' : ''}`,
            message: `You have ${pendingTasks.length} pending task${pendingTasks.length > 1 ? 's' : ''}. Review and start working!`,
            time: '20 min ago',
            priority: 2
          });
        }

        const inProgressTasks = assignedTasks.filter(t => t.taskStatus === 'in-progress');
        if (inProgressTasks.length > 2) {
          notifications.push({
            type: 'deadline',
            icon: '⚡',
            title: 'Too Many In-Progress Tasks',
            message: `You have ${inProgressTasks.length} tasks in progress. Focus on completing them.`,
            time: '35 min ago',
            priority: 2
          });
        }

        // Performance achievement
        const score = PerformanceAI.calculatePerformanceScore(employee);
        if (score > 85) {
          notifications.push({
            type: 'achievement',
            icon: '🌟',
            title: 'Excellent Performance!',
            message: 'You\'re doing great! Keep up this momentum.',
            time: '45 min ago',
            priority: 3
          });
        }

        // Streak milestone
        if (employee.streak >= 7 && employee.streak % 7 === 0) {
          notifications.push({
            type: 'achievement',
            icon: '🔥',
            title: `${employee.streak}-Day Streak!`,
            message: `Amazing! You\'ve maintained a ${employee.streak}-day streak. You\'re unstoppable! 🎉`,
            time: '1 hour ago',
            priority: 3
          });
        }

        return notifications.sort((a, b) => a.priority - b.priority);
      }
    }

    // ============================================
    // APPLICATION INITIALIZATION
    // ============================================

    UIManager.init();

    // Real-time metric simulation (in production, this would connect to APIs)
    setInterval(() => {
      State.employees.forEach(emp => {
        // Simulate metric changes
        if (Math.random() > 0.7) emp.gitCommits += Math.floor(Math.random() * 3);
        if (Math.random() > 0.8) emp.tasksCompleted += Math.floor(Math.random() * 2);
        if (Math.random() > 0.9) emp.jiraTickets += Math.floor(Math.random() * 2);
        if (Math.random() > 0.6) emp.workHours += Math.floor(Math.random() * 4);

        // Update streak
        if (emp.gitCommits > 0 && emp.tasksCompleted > 0) {
          emp.streak = Math.min(emp.streak + 1, 30);
        }

        emp.lastActive = new Date().toISOString();
      });
    }, 30000); // Update every 30 seconds
